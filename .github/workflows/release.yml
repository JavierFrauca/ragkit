name: Release

# Publica los paquetes en NuGet.org al empujar un tag de versión, p. ej. v1.0.0.
# Usa Trusted Publishing (OIDC, sin claves de larga duración): requiere una
# política configurada en nuget.org (usuario → Publicación de confianza) con
# Propietario=JavierFrauca, Repositorio=ragkit, Archivo de flujo de trabajo=
# release.yml, Entorno en blanco; y el secreto NUGET_USER (el nombre de
# usuario/perfil de nuget.org, no el email) en el repositorio.
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # necesario para solicitar el token OIDC de Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Check tag matches Version
        # El tag vX.Y.Z debe coincidir con <Version> de Directory.Build.props.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(grep -oP '(?<=<Version>)[^<]+' src/Directory.Build.props | head -1)
          echo "tag=$TAG  version=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::El tag ($TAG) no coincide con <Version> ($VER) en Directory.Build.props"
            exit 1
          fi

      - name: Restore
        run: dotnet restore RagKit.slnx
      - name: Build
        run: dotnet build RagKit.slnx -c Release --no-restore -p:ContinuousIntegrationBuild=true
      - name: Test
        run: dotnet test RagKit.slnx -c Release --no-build
      - name: Pack
        run: dotnet pack RagKit.slnx -c Release -o artifacts --no-build -p:ContinuousIntegrationBuild=true

      - name: NuGet login (OIDC → clave de API temporal, válida 1h)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        # Sube .nupkg y .snupkg (símbolos) en el mismo push. --skip-duplicate evita
        # fallar si una versión ya estaba publicada.
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
