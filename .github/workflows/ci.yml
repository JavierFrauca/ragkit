name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          # Both runtimes/SDKs: the packages multi-target net10.0 and net8.0.
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore
        run: dotnet restore RagKit.slnx
      - name: Build
        run: dotnet build RagKit.slnx -c Release --no-restore -p:ContinuousIntegrationBuild=true
      - name: Test
        # Integration tests (Qdrant/Postgres/SQL Server/ONNX/LLM) self-skip when
        # their service/model/key isn't present, so CI runs the offline suite.
        run: dotnet test RagKit.slnx -c Release --no-build
      - name: Pack
        run: dotnet pack RagKit.slnx -c Release -o artifacts --no-build -p:ContinuousIntegrationBuild=true
      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
