# Servicios de infraestructura para los tests de integración de RagKit.
#
# Uso local:
#   docker compose up -d --wait
#   dotnet test RagKit.slnx -c Release -e RAGKIT_QDRANT_URL=http://127.0.0.1:6333 -e RAGKIT_POSTGRES_CONNECTION="Host=127.0.0.1;Port=5432;Database=ragkit;Username=ragkit;Password=ragkit" -e RAGKIT_SQLSERVER_CONNECTION="Server=127.0.0.1,1433;Database=ragkit;User Id=sa;Password=Ragkit123!;TrustServerCertificate=True"
#   docker compose down -v
#
# En CI se usan las mismas variables de entorno con los nombres de servicio de
# docker compose como host (qdrant, postgres, sqlserver).

services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ragkit
      POSTGRES_USER: ragkit
      POSTGRES_PASSWORD: ragkit
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragkit -d ragkit"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Ragkit123!"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'Ragkit123!' -Q 'SELECT 1'"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s
